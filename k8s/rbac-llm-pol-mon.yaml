apiVersion: v1
kind: ServiceAccount
metadata:
  name: limitador-monitor
  namespace: llm-playground
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: limitador-config-reader
  namespace: kuadrant-system
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
  resourceNames: ["limitador-limits-config-limitador"]  # scope to just this configmap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: limitador-monitor-config-reader
  namespace: kuadrant-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: limitador-config-reader
subjects:
- kind: ServiceAccount
  name: limitador-monitor
  namespace: llm-playground