apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llm-playground
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/bugbiteme/llm-playground-manifests.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: llm-playground
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
